      <div class="row d-flex justify-content-center">

          <form class="w-100 p-5 tradeform mt-3">
            <h4 class="text-center">New Trade</h4>
            <label class="mt-3"><b>Category</b></label>
            <input
              class="form-control mt-2"
              type="text"
              placeholder="Enter category name"
            />

            <label class="mt-3"><b>Title</b></label>
            <input class="form-control" type="text" placeholder="Enter Title" />

            <label class="mt-3"><b>Year</b></label>
            <input class="form-control" type="text" placeholder="Enter year" />

            <label class="mt-3"><b>Category Image</b></label>
            <input class="form-control" type="file" />

            <label class="mt-3"><b>Description</b></label>
            <textarea class="form-control" cols="20" rows="5"></textarea>
            <div class="text-center mt-3">
              <a href="trades.html" class="thmbtn1">Create Trade</a>
            </div>
          </form>
        </div>
      </div>
